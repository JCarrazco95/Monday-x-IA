name: CI

# Corre en cada push a master y en cada Pull Request. Objetivo: que un push
# roto se vea ANTES de que llegue a producción (Render despliega automático
# en cada push a master) — no bloquea el despliegue, solo avisa con una
# marca ✅/❌ junto al commit en GitHub.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      # Node 22+ requerido por node:sqlite (usado en desarrollo/CI; producción
      # usa Postgres cuando hay DATABASE_URL).
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar (tsc)
        run: npm run build

      - name: Pruebas (vitest)
        run: npm test

  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build (vite build)
        run: npm run build

      - name: Typecheck (tsc -b)
        # No bloqueante: monday-sdk-js trae .ts con errores de tipo pre-existentes
        # (ver CLAUDE.md §10) que no afectan el build real (vite build). Se corre
        # igual para que el log quede visible, pero no rompe el workflow.
        run: npm run typecheck || echo "⚠️ typecheck con errores pre-existentes de monday-sdk-js (no bloqueante, ver CLAUDE.md §10)"
