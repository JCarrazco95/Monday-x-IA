# ===========================================================================
#  Blueprint de Render para MAXIRent (deploy de un clic).
#  Render -> New -> Blueprint -> conecta el repo. Crea 2 servicios:
#   - maxirent-backend  (Node/Express + node:sqlite, con disco persistente)
#   - maxirent-frontend (Vite -> Nginx, hace proxy de /api al backend)
#  Tras el primer deploy: copia la URL del backend y pegala en la variable
#  BACKEND_URL del frontend (Manual Deploy o Settings -> Environment).
#  Las mismas imagenes Docker funcionan igual en Railway/Fly.io.
# ===========================================================================
services:
  - type: web
    name: maxirent-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Base de datos durable (Postgres gestionado, definido en "databases" abajo).
      # Con DATABASE_URL presente, el backend usa Postgres en vez de SQLite.
      - key: DATABASE_URL
        fromDatabase:
          name: maxirent-db
          property: connectionString
      # IA: usa gemini para pruebas (gratis) o claude en produccion.
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Monday. El token se pega en el dashboard de Render (es secreto).
      - key: MONDAY_API_TOKEN
        sync: false
      # ⚠️ Board de ESCRITURA = board de PRUEBA (workspace AI Hub). El board real
      # "Leads Maxirent" (8311006929) es SOLO LECTURA y NUNCA se escribe.
      - key: MONDAY_BOARD_ID_LEADS
        value: "18419649847"
      # Forecast con datos reales (solo lectura de estos boards de producción).
      - key: MONDAY_BOARD_ID_OPORTUNIDADES
        value: "8311006777"
      - key: MONDAY_BOARD_ID_OBJETIVOS
        value: "8311006715"
      # false = las escrituras van al board de prueba mapeado abajo. Poner true
      # para congelar TODA escritura a Monday (candado global).
      - key: MONDAY_READ_ONLY
        value: "false"
      # Columnas de salida en el board de prueba (solo estas se escriben).
      - key: MONDAY_COLUMN_MAP
        value: '{"score_lead":"numeric_mm4r7m81","prioridad":"text_mm4rjxkq","riesgo":"text_mm4rbjec","perfil_empresa":"long_text_mm4rshpz","accion_recomendada":"long_text_mm4rf0rb","sentimiento_llamada":"text_mm4rfcb5","probabilidad_cierre":"text_mm4r39gs","oportunidad_upsell":"text_mm4razmd","tipo_oportunidad":"text_mm4ry458","requiere_atencion":"color_mm4rqvnw"}'
      - key: MONDAY_WEBHOOK_SECRET
        sync: false
      # Aircall (opcional, llamadas reales + transcripcion).
      - key: AIRCALL_API_ID
        sync: false
      - key: AIRCALL_API_TOKEN
        sync: false
      - key: AIRCALL_WEBHOOK_TOKEN
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false

  - type: web
    name: maxirent-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    autoDeploy: true
    envVars:
      # Pega aqui la URL publica del backend tras su primer deploy,
      # p. ej. https://maxirent-backend.onrender.com  (sin barra final).
      - key: BACKEND_URL
        sync: false
      # La MISMA clave que API_KEY del backend. Nginx la inyecta server-side
      # como header x-api-key en el proxy /api (runtime; también acepta el
      # nombre VITE_API_KEY si ya lo tenias configurado).
      - key: API_KEY
        sync: false

# ===========================================================================
#  Postgres gestionado (durable, con respaldos). El backend lo usa vía
#  DATABASE_URL. En el plan free, Render expira la BD a los 90 días: para
#  producción real subir a un plan de pago o usar Neon/Supabase.
# ===========================================================================
databases:
  - name: maxirent-db
    plan: free
    databaseName: maxirent
    user: maxirent
